<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - e-redo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: var(--text-main); margin: 0; font-family: 'Inter', sans-serif; padding: 20px;}
        .auth-container-centro { background: var(--card-bg); border: 4px solid var(--bg-color); padding: 40px; border-radius: 16px; box-shadow: 10px 10px 0px var(--accent-light-orange); width: 100%; max-width: 400px; text-align: center; color: var(--text-main); }
        .auth-container-centro h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin: 0 0 20px 0; }

        /* Botões Sociais */
        .social-btns { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .btn-social { display: flex; align-items: center; justify-content: center; gap: 10px; background: transparent; border: 2px solid var(--text-main); padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 600; color: var(--text-main); transition: 0.2s; }
        .btn-social:hover { background: var(--gray-card); }
        .divisor { display: flex; align-items: center; margin: 15px 0; color: var(--muted-purple); font-size: 0.9rem; }
        .divisor::before, .divisor::after { content: ""; flex: 1; border-bottom: 1px solid var(--border-color); margin: 0 10px; }

        .auth-container-centro input { width: 100%; padding: 12px; margin-bottom: 15px; border: 3px solid var(--text-main); border-radius: 8px; font-size: 1rem; box-sizing: border-box; background: var(--bg-color); }

        /* Validador de Senha */
        #password-reqs { text-align: left; font-size: 0.8rem; color: var(--muted-purple); list-style: none; padding: 0; margin-top: -10px; margin-bottom: 20px; }
        #password-reqs li { margin-bottom: 3px; transition: color 0.3s; }
        .req-pass { color: #2ecc71 !important; font-weight: bold; }
        .req-fail { color: #e74c3c; }

        .auth-container-centro .btn-brutal { width: 100%; padding: 15px; font-size: 1.1rem; margin-bottom: 15px; }
        .auth-links { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .auth-links a { color: var(--muted-purple); text-decoration: none; font-weight: 600; transition: 0.2s; }
        .auth-links a:hover { color: var(--text-main); }

        #msg-erro { color: #e74c3c; font-size: 0.9rem; font-weight: bold; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
    <div class="auth-container-centro">
        <h2>Criar Conta</h2>

        <div class="social-btns">
            <button class="btn-social" onclick="mostrarErro('Integração em breve!')">Google</button>
            <button class="btn-social" onclick="mostrarErro('Integração em breve!')">Microsoft</button>
        </div>

        <div class="divisor">ou cadastre com e-mail</div>

        <p id="msg-erro"></p>

        <input type="text" id="registo-nome" placeholder="Nome completo">
        <input type="email" id="registo-email" placeholder="Seu melhor e-mail">
        <input type="password" id="registo-senha" placeholder="Crie uma senha (mínimo 6 caracteres)">

        <ul id="password-reqs">
            <li id="req-length" class="req-fail">🔴 Mínimo 6 caracteres</li>
            <li id="req-number" class="req-fail">🔴 Pelo menos 1 número</li>
            <li id="req-special" class="req-fail">🔴 Pelo menos 1 caractere especial (!@#$%)</li>
        </ul>

        <button class="btn-brutal btn-roxo" onclick="enviarRegisto()">Cadastrar Grátis</button>

        <div class="auth-links">
            <a href="/login">Já tem conta? Entre aqui</a>
            <a href="/" style="font-size: 0.85rem; margin-top: 15px;">← Voltar ao Início</a>
        </div>
    </div>

    <script>
        function mostrarErro(texto) {
            const erroEl = document.getElementById('msg-erro');
            erroEl.innerText = texto;
            erroEl.style.display = 'block';
        }

        // Mágica da validação de senha em tempo real
        document.getElementById('registo-senha').addEventListener('input', function(e) {
            const val = e.target.value;
            const reqLength = document.getElementById('req-length');
            const reqNumber = document.getElementById('req-number');
            const reqSpecial = document.getElementById('req-special');

            if (val.length >= 6) { reqLength.innerHTML = '🟢 Mínimo 6 caracteres'; reqLength.className = 'req-pass'; }
            else { reqLength.innerHTML = '🔴 Mínimo 6 caracteres'; reqLength.className = 'req-fail'; }

            if (/\d/.test(val)) { reqNumber.innerHTML = '🟢 Pelo menos 1 número'; reqNumber.className = 'req-pass'; }
            else { reqNumber.innerHTML = '🔴 Pelo menos 1 número'; reqNumber.className = 'req-fail'; }

            if (/[!@#$%^&*(),.?":{}|<>]/.test(val)) { reqSpecial.innerHTML = '🟢 Pelo menos 1 caractere especial (!@#$%)'; reqSpecial.className = 'req-pass'; }
            else { reqSpecial.innerHTML = '🔴 Pelo menos 1 caractere especial (!@#$%)'; reqSpecial.className = 'req-fail'; }
        });

        // LÓGICA DO "ENTER" PARA PULAR DE CAMPO
        document.getElementById('registo-nome').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') document.getElementById('registo-email').focus();
        });
        document.getElementById('registo-email').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') document.getElementById('registo-senha').focus();
        });
        document.getElementById('registo-senha').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') enviarRegisto();
        });

        function enviarRegisto() {
            const nome = document.getElementById('registo-nome').value;
            const email = document.getElementById('registo-email').value;
            const senha = document.getElementById('registo-senha').value;

            if (!nome || !email || !senha) { mostrarErro("Preencha todos os campos."); return; }
            if (senha.length < 6 || !/\d/.test(senha) || !/[!@#$%^&*(),.?":{}|<>]/.test(senha)) {
                mostrarErro("Sua senha precisa estar toda verde!"); return;
            }

            const btn = document.querySelector('.btn-roxo');
            btn.innerText = "Criando..."; btn.disabled = true;

            fetch('/api/cadastrar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome: nome, email: email, senha: senha })
            }).then(res => res.json()).then(data => {
                if (data.sucesso) {
                    btn.innerText = "Sucesso! Entrando...";
                    btn.style.backgroundColor = "#2ecc71"; // Fica verde!

                    // LÓGICA DE VOLTAR DE ONDE VEIO (Auto-login ativado pelo Python!)
                    const leiPendente = sessionStorage.getItem('leiPendente');
                    if(leiPendente) {
                        window.location.href = '/?lei=' + leiPendente;
                    } else {
                        window.location.href = '/';
                    }
                } else {
                    mostrarErro(data.erro);
                    btn.innerText = "Cadastrar Grátis"; btn.disabled = false;
                }
            });
        }
    </script>
</body>
</html>
