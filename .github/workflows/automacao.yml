name: Ingestao Diaria eREDO

on:
  schedule:
    # Roda todo dia às 8h da manhã UTC (5h da manhã no horário de Brasília)
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Esse comando cria um botão mágico para rodarmos manualmente quando quisermos!

jobs:
  atualizar_banco_de_dados:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Clonar o repositório
      uses: actions/checkout@v4

    - name: 2. Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 3. Instalar bibliotecas
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. Rodar Ingestão de Novas Leis
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: python ingestao.py

    - name: 5. Rodar Simulação do Fórum
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: python simulador_forum.py